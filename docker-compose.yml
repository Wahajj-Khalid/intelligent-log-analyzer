services:
  postgres-db:
    image: postgres:15-alpine
    container_name: log_analytics_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: akaimenoakuma
      POSTGRES_DB: log_analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: